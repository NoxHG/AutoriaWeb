<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="principal.css">
        <title>INFOWEB NA COPA</title>
    </head>
    <body>
        <!-- 
        MARCAÇÕES DE SEÇÕES:
          - Header - cabeçalho
          - Nav - menu de navegação
          - Main - área principal (conteúdo sem cabeçalho e rodapé)
          - section - área de seção da página
          - footer - rodapé

          * NÃO TÊM FORMATAÇÃO PADRÃO
          * AS UTILIZAÇÕES DESSAS MARCAÇÕES SÃO PARA ORGANIZAÇÃO DO CÓDIGO!!!
        -->

       <header>
            <!-- 
            Marcação de header: delimita cabeçalho
              - pode ter mais de uma em uma página
              - no cabeçalho de uma página, pode ter: marca, menu de usuário, busca, menu de redes sociais
            -->

            <h1>INFOWEB NA COPA</h1>
            <nav>
                <!-- 
                marcação de nav delimita a navegação da página
                Uma página pode ter vários menus:
                  - menu principal
                  - menu local (de uma categoria específica)
                  - menu de usuário: favoritos, carrinho, login...
                  - menu de acessibilidade
                  - menu institucional: pagamentos, política de trocas...
                -->
                <ol>
                    <li><a href="">FIGURINHAS</a></li>
                    <li><a href="">AGENDA</a></li>
                    <li><a href="">ORGANIZADORES</a></li>
                    <li><a href="">CONTATO</a></li>
                </ol>
            </nav>
       </header>
       <main>
            <!-- main: delimita a área principal sem cabeçalho e rodapé (só pode ter um main na página) -->
            <section>
                <!-- marcação de section representa uma seção de conteúdo
                      - precisa ter um título
                      - pode ter várias seções em uma página
                      - não pode ter uma seção dentro de outra
                      - a marcação de seção pode estar dentro do header, do footer....
                       -->

                    <h2>TROCA DE FIGURINHAS</h2>
                    <h3>Regras:</h3>
                    <ul>
                        <li>Figurinha do Brasil vale 2</li>
                        <li>Não aceitamos rasgadas</li>
                        <li>Figurinha da coca só troca com as da coca</li>
                        <li>Figurinha brihosa vale 2</li>
                    </ul>
            </section>
       </main>
       <footer>
            <!--         
            Marcação de footer: representa o rodapé
            Geralmente tem:
                - menu principal repetido
                - contato
                - endereço
                - menu de redes sociais, institucional
                - marca
                - desenvolvimento
                - direitos reservados...
            -->
            <p>Desenvolvido por IFRN/CNAT/DIATINF/INFOWEB.</p>
       </footer>
    </body>
</html>
