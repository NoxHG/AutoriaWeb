<!DOCTYPE html>
    <html lang="pt-br">
    <head>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Renazon</title>
    </head>
    <body>
        <h1>
            <img src="Imagens/Component 8.png" alt="Logotipo">

            <img src="Imagens/Component 8.png" alt="Logotipo">
        </figure>
        <!-- Tag exclusiva para se pôr imagens, agrupandoas em um só bloco -->
    </body>
