<!DOCTYPE html>
    <html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="principal.css">
        <title>EMPREENDA CNAT</title>
    </head>
    <body>
        <h1>EMPREENDA CNAT
            <img src="Imagens/ITNC.jpg" alt="marca da ITNC">
        </h1>
        <!-- 
            IMG:
                - Permite incluir imagem no html
                - Imagem no html são conteudistas (é diferente de uma imagem decorativa)
                - Imagem pode png, jpg, jpeg, gif, jiff...
                src = source = código = recebe o nome do arquivo
                alt = alternative = conteúdo alternativo = acessibilidade
                - a marcação de imagem pode ficar dentro da marcação h1, p, li, figure

            FIGURE:
                - É uma marcação nova que representa um bloco para imagem
                - Pode ter uma imagem ou várias
                - Pode ter figcaption - que é uma marcação de legenda
        -->

        <figure class="imagem">
            <img src="Imagens/Empreenda.png" alt="banner do evento">
            <figcaption>Legenda para esta imagem</figcaption>
            <!-- Tag utilizada para importar imagens -->
        </figure>
        <!-- Tag utilizada para adicionar figuras -->


        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Itaque, minima architecto. Hic, rem quia nobis labore sunt, accusantium est assumenda soluta, sapiente quibusdam ea! Expedita facilis dolores iure laudantium magni.</p>
        <ul>
            <li>Palestras</li>
            <li>Oficinas</li>
            <li>Prêmios</li>
            <li>Desafios</li>
            <!-- li * 5 e Enter cria 5 tags li de uma vez -->
        </ul>
    </body>
</html>
